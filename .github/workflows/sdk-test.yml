name: Build

on:
  workflow_dispatch:
    inputs:
      sdk_url_path:
        description: 'SDK url'
        required: true
        default: 'https://downloads.openwrt.org/releases/24.10.5/targets'
        type: string
      arch:
        description: 'arch'
        required: true
        default: 'x86_64'
        type: string
      sdk_path:
        description: 'SDK target path'
        required: true
        default: '/x86/64'
        type: string

jobs:
  build:
    name: Build SDK 
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    env:
      SDK_NAME: -sdk-
      ARCH: ${{ github.event.inputs.arch }}
      CACHE_DIR: ~/cache
    steps:
      - name: set env
        run: echo "SDK_URL_PATH=${{ github.event.inputs.sdk_url_path }}${{ github.event.inputs.sdk_path }}" >> $GITHUB_ENV
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Cache
        uses: actions/cache@v5
        with:
          path: ${{ env.CACHE_DIR }}
          key: ${{ runner.os }}:openwrt-v2ray:${{ env.ARCH }}:cache:${{ github.run_number }}
          restore-keys: |
            ${{ runner.os }}:openwrt-v2ray:${{ env.ARCH }}:cache:

      - name: Setup CCache
        uses: actions/cache@v5
        with:
          path: ~/.ccache
          key: ${{ runner.os }}:openwrt-v2ray:${{ env.ARCH }}:ccache:${{ github.run_number }}
          restore-keys: |
            ${{ runner.os }}:openwrt-v2ray:${{ env.ARCH }}:ccache:

      - name: Install Dependencies
        run: |
          sudo apt-get update && \
            sudo apt-get install -yq gettext libncurses5-dev rsync xsltproc

      - name: Prepare For Build
        run: |
          sdk_home="$(mktemp -d)"

          test -d ~/.ccache || mkdir -p ~/.ccache
          ln -sf ~/.ccache "$sdk_home/.ccache"

          echo "SDK_HOME=$sdk_home" >> $GITHUB_ENV
          echo "CONFIG_CCACHE=y" >> $GITHUB_ENV

      - name: Build package
        env:
          OPENWRT_GOLANG_COMMIT: ${{ secrets.OPENWRT_GOLANG_COMMIT }}
        run: sh compile.sh

      - name: Show CCache Status
        run: |
          eval "${{ env.SDK_HOME }}/staging_dir/host/bin/ccache -s"

      - name: Save Build Result
        uses: actions/upload-artifact@v7
        with:
          name: v2ray-core
          path: |
            *.ipk
            *.apk
          overwrite: true
          retention-days: 7
